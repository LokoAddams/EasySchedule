<div class="confirm-backdrop" (click)="cancel.emit()"></div>

<section class="confirm-modal" role="dialog" aria-modal="true">
  <div class="confirm-modal__icon" aria-hidden="true">!</div>
  <h2 class="confirm-modal__title">{{ title }}</h2>
  <p class="confirm-modal__text">{{ message }}</p>
  <div class="confirm-modal__actions">
    <button type="button" class="confirm-modal__btn confirm-modal__btn--ghost" (click)="cancel.emit()">
      {{ cancelLabel }}
    </button>
    <button type="button" class="confirm-modal__btn" (click)="confirm.emit()">
      {{ confirmLabel }}
    </button>
  </div>
</section>
