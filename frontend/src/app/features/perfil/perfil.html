<section class="perfil-page">
	<header class="perfil-page__header">
		<p class="perfil-page__eyebrow">{{ 'perfil.title' | translate }}</p>
		<h1 class="perfil-page__name" *ngIf="!loading && perfil">{{ getNombreCompleto() }}</h1>
	</header>

	<p class="perfil-page__status" *ngIf="loading">{{ 'perfil.loading' | translate }}</p>
	<p class="perfil-page__status perfil-page__status--error" *ngIf="!loading && errorKey">{{ errorKey | translate }}</p>

	<div class="perfil-layout" *ngIf="!loading && perfil">
		<article class="perfil-avatar-card">
			<div class="perfil-avatar-card__media" [attr.aria-label]="'perfil.avatarAlt' | translate" [title]="'perfil.avatarAlt' | translate">
				<div class="perfil-avatar-card__avatar">
					<svg viewBox="0 0 24 24" aria-hidden="true">
						<path
							d="M12 2a5 5 0 1 1-5 5 5 5 0 0 1 5-5Zm0 12c4.41 0 8 2.24 8 5v3h-2v-3c0-1.47-2.41-3-6-3s-6 1.53-6 3v3H4v-3c0-2.76 3.59-5 8-5Z"
						></path>
					</svg>
				</div>
			</div>
		</article>

		<article class="perfil-data-card" *ngIf="!editMode">
			<div class="perfil-grid">
				<label class="perfil-field">
					<span>{{ 'perfil.fields.username' | translate }}</span>
					<input [value]="getValorSeguro(perfil.username)" readonly (click)="activarEdicionDesdeCampo('username')" [class.perfil-input--pending]="esCampoEditablePendiente(perfil.username, 'username')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.email' | translate }}</span>
					<input [value]="getValorSeguro(perfil.email, 'email')" readonly (click)="activarEdicionDesdeCampo('email')" [class.perfil-input--pending]="esCampoEditablePendiente(perfil.email, 'email')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.nombre' | translate }}</span>
					<input [value]="getValorSeguro(perfil.nombre, 'nombre')" readonly (click)="activarEdicionDesdeCampo('nombre')" [class.perfil-input--pending]="esCampoEditablePendiente(perfil.nombre, 'nombre')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.universidad' | translate }}</span>
					<input [value]="getValorSeguro(perfil.universidad, 'universidad')" readonly [class.perfil-input--auto]="esCampoAutoPendiente(perfil.universidad, 'universidad')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.apellido' | translate }}</span>
					<input [value]="getValorSeguro(perfil.apellido, 'apellido')" readonly (click)="activarEdicionDesdeCampo('apellido')" [class.perfil-input--pending]="esCampoEditablePendiente(perfil.apellido, 'apellido')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.carrera' | translate }}</span>
					<input [value]="getValorSeguro(perfil.carrera, 'carrera')" readonly [class.perfil-input--auto]="esCampoAutoPendiente(perfil.carrera, 'carrera')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.carnet' | translate }}</span>
					<input [value]="getValorSeguro(perfil.carnetIdentidad, 'carnetIdentidad')" readonly (click)="activarEdicionDesdeCampo('carnetIdentidad')" [class.perfil-input--pending]="esCampoEditablePendiente(perfil.carnetIdentidad, 'carnetIdentidad')" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.fechaNacimiento' | translate }}</span>
					<input [value]="getFechaNacimientoFormateada()" readonly (click)="activarEdicionDesdeCampo('fechaNacimiento')" />
				</label>
			</div>

			<div class="perfil-actions">
				<button class="perfil-password-btn" type="button">{{ 'perfil.actions.changePassword' | translate }}</button>
			</div>
		</article>

		<form class="perfil-data-card" *ngIf="editMode" [formGroup]="editForm" (ngSubmit)="guardarEdicion()">
			<div class="perfil-grid">
				<label class="perfil-field">
					<span>{{ 'perfil.fields.username' | translate }}</span>
					<input type="text" formControlName="username" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.email' | translate }}</span>
					<input type="email" formControlName="email" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.nombre' | translate }}</span>
					<input type="text" formControlName="nombre" />
				</label>

				<label class="perfil-field perfil-field--readonly">
					<span>{{ 'perfil.fields.universidad' | translate }}</span>
					<small class="perfil-readonly-badge">{{ 'perfil.readOnly' | translate }}</small>
					<input type="text" formControlName="universidad" readonly aria-readonly="true" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.apellido' | translate }}</span>
					<input type="text" formControlName="apellido" />
				</label>

				<label class="perfil-field perfil-field--readonly">
					<span>{{ 'perfil.fields.carrera' | translate }}</span>
					<small class="perfil-readonly-badge">{{ 'perfil.readOnly' | translate }}</small>
					<input type="text" formControlName="carrera" readonly aria-readonly="true" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.carnet' | translate }}</span>
					<input type="text" formControlName="carnetIdentidad" />
				</label>

				<label class="perfil-field">
					<span>{{ 'perfil.fields.fechaNacimiento' | translate }}</span>
					<div class="perfil-date-picker">
						<input
							type="text"
							class="perfil-datepicker-input"
							formControlName="fechaNacimiento"
							ngbDatepicker
							datepickerClass="perfil-datepicker-theme"
							#fechaNacimientoPicker="ngbDatepicker"
							[minDate]="fechaNacimientoMinDate"
							[maxDate]="fechaNacimientoMaxDate"
							navigation="select"
							[autoClose]="'outside'"
							placement="auto"
							[container]="'body'"
							[readonly]="true"
						/>
						<button type="button" class="perfil-date-toggle" (click)="fechaNacimientoPicker.toggle()">
							<img src="assets/img/calendar.webp" alt="calendar icon" />
						</button>
					</div>
				</label>
			</div>

			<p class="perfil-validation" *ngIf="editForm.invalid && editForm.touched">
				{{ 'perfil.validation.required' | translate }}
			</p>

			<div class="perfil-actions">
				<button class="perfil-edit-btn" type="submit" [disabled]="saving">
					{{ saving ? ('perfil.actions.saving' | translate) : ('perfil.actions.save' | translate) }}
				</button>
				<button class="perfil-cancel-btn" type="button" (click)="cancelarEdicion()">{{ 'perfil.actions.cancel' | translate }}</button>
				<button class="perfil-password-btn" type="button">{{ 'perfil.actions.changePassword' | translate }}</button>
			</div>
		</form>
	</div>

	<div class="perfil-modal-backdrop" *ngIf="showSuccessModal" (click)="cerrarModalExitoBackdrop($event)">
		<section class="perfil-modal" role="dialog" aria-modal="true" [attr.aria-label]="'perfil.modal.updatedTitle' | translate">
			<div class="perfil-modal__icon" aria-hidden="true">✓</div>
			<h2 class="perfil-modal__title">{{ 'perfil.modal.updatedTitle' | translate }}</h2>
			<p class="perfil-modal__text">{{ 'perfil.success.updated' | translate }}</p>
			<button type="button" class="perfil-modal__btn" (click)="cerrarModalExito()">{{ 'perfil.modal.accept' | translate }}</button>
		</section>
	</div>
</section>
